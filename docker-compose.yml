services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - RUNNING_IN_DOCKER=true
    command: ["npm", "run", "dev"]
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  mongo:
    image: mongo:7.0
    env_file:
      - ./backend/.env
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  mongo-express:
    image: mongo-express
    profiles:
      - debug
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
